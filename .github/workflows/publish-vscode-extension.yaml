name: Publish VS Code Extension

on:
  workflow_dispatch:
    inputs:
      tag_name:
        description: "Release tag to publish, for example vscode/v1.0.0"
        required: true
        type: string
  push:
    tags:
      - "vscode/v*.*.*"

env:
  TAG_NAME: ""
  VERSION: ""

jobs:
  publish-vscode:
    name: Publish VS Code Extension
    environment: vscode-publish
    runs-on: ubuntu-latest
    permissions:
      contents: write

    defaults:
      run:
        working-directory: vscode

    steps:
      - name: Checkout editor repo
        uses: actions/checkout@v6

      - name: Setup Node
        uses: actions/setup-node@v6
        with:
          node-version: 24
          cache: npm
          cache-dependency-path: vscode/package-lock.json

      - name: Install extension dependencies
        run: npm ci

      - name: Resolve release tag and version
        shell: bash
        run: |
          if [ "${{ github.event_name }}" = "workflow_dispatch" ]; then
            tag_name='${{ inputs.tag_name }}'
          else
            tag_name='${{ github.ref_name }}'
          fi

          if [[ ! "$tag_name" =~ ^vscode/v[0-9]+\.[0-9]+\.[0-9]+$ ]]; then
            echo "Tag must look like vscode/v1.0.0. Got: $tag_name" >&2
            exit 1
          fi

          version_from_tag="${tag_name#vscode/v}"
          version_from_pkg="$(node -p "require('./package.json').version")"
          if [ "$version_from_tag" != "$version_from_pkg" ]; then
            echo "Tag version ($version_from_tag) does not match vscode/package.json version ($version_from_pkg)." >&2
            exit 1
          fi

          echo "VERSION=$version_from_tag" >> "$GITHUB_ENV"
          echo "TAG_NAME=$tag_name" >> "$GITHUB_ENV"

      - name: Lint extension
        run: npm run lint

      - name: Compile extension
        run: npm run compile

      - name: Package VSIX
        shell: bash
        run: |
          mkdir -p ../artifacts
          npx @vscode/vsce package --out "../artifacts/fidan-${VERSION}.vsix"

      - name: Publish to VS Code Marketplace
        shell: bash
        env:
          VSCE_PAT: ${{ secrets.VSCE_PAT }}
        run: |
          if [ -z "${VSCE_PAT:-}" ]; then
            echo "Missing required secret: VSCE_PAT" >&2
            exit 1
          fi
          npx @vscode/vsce publish --packagePath "../artifacts/fidan-${VERSION}.vsix" -p "$VSCE_PAT"

      - name: Create GitHub release and upload VSIX
        uses: softprops/action-gh-release@v2
        with:
          tag_name: ${{ env.TAG_NAME }}
          name: Fidan VS Code ${{ env.VERSION }}
          generate_release_notes: true
          files: artifacts/fidan-${{ env.VERSION }}.vsix
